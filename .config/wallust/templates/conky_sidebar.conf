conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = '{{foreground}}',
    color1 = '{{color1}}', -- Secondary grey
    color2 = '{{color3}}', -- Highlight light grey
    double_buffer = true,
    font = 'Iosevka:size=10:bold',
    gap_x = 20,
    gap_y = 65, -- Shifted down to match device-control and avoid top bar overlap
    minimum_width = 234,
    maximum_width = 234,
    minimum_height = 900, -- Extended height to cover more vertical space
    no_buffers = true,
    out_to_console = false,
    out_to_stderr = false,
    extra_newline = false,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'override',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_colour = '{{background}}',
    update_interval = 2.0,
    use_xft = true,
    lua_load = '/home/mukes/modified-zenities/.config/conky/grouped_processes.lua',
    lua_draw_hook_pre = 'draw_sidebar_background',
}

conky.text = [[
${voffset 16}${goto 14}${font Iosevka:size=12:bold}${color2}SYSTEM OVERVIEW${font}${color}
${goto 20}${color1}Uptime:${color} $uptime
${goto 20}${color1}Kernel:${color} $kernel

${voffset 10}${goto 14}${font Iosevka:size=12:bold}${color2}CPU & TEMPERATURE${font}${color}
${goto 20}${color1}Usage:${color} $cpu% ${alignr}${execi 5 ~/.config/eww/scripts/get-temperature.sh}°C  
${goto 14}${cpugraph 32,206 {{color6 | strip}} {{color8 | strip}}}

${voffset 10}${goto 14}${font Iosevka:size=12:bold}${color2}GPU & VRAM${font}${color}
${goto 20}${color1}GPU:${color} ${execi 5 ~/.config/eww/scripts/get-gpu.sh}% ${alignr}${execi 5 sensors | grep -A 4 amdgpu | grep edge | awk '{print $2}' | tr -d '+°C' | cut -d'.' -f1}°C  
${goto 20}${color1}VRAM:${color} ${execi 5 ~/.config/eww/scripts/get-vram.sh}% ${alignr}${execi 5 ~/.config/eww/scripts/get-vram-detail.sh}  

${voffset 10}${goto 14}${font Iosevka:size=12:bold}${color2}MEMORY (RAM)${font}${color}
${goto 20}${color1}RAM:${color} $memperc% ${alignr}$mem / $memmax  
${goto 20}${color1}Swap:${color} $swapperc% ${alignr}$swap / $swapmax  

${voffset 10}${goto 14}${font Iosevka:size=12:bold}${color2}STORAGE & DISK I/O${font}${color}
${goto 20}${color1}Disk:${color} ${fs_used_perc /}% ${alignr}${fs_used /} / ${fs_size /}  
${goto 20}${color1}Read:${color} $diskio_read ${alignr}${color1}Write:${color} $diskio_write  
${goto 14}${diskiograph 32,206 {{color6 | strip}} {{color8 | strip}}}

${voffset 10}${goto 14}${font Iosevka:size=12:bold}${color2}NETWORK (wlan0)${font}${color}
${goto 20}${color1}Down:${color} ${downspeed wlan0} ${alignr}${color1}Up:${color} ${upspeed wlan0}  
${goto 14}${downspeedgraph wlan0 32,206 {{color6 | strip}} {{color8 | strip}}}

${voffset 10}${goto 14}${font Iosevka:size=12:bold}${color2}POWER MONITOR${font}${color}
${goto 20}${color1}Draw:${color} ${alignr}${execi 5 ~/.config/eww/scripts/get-power-draw.sh}  

${voffset 10}${goto 14}${font Iosevka:size=12:bold}${color2}TOP PROCESSES (CPU)${font}${color}
${font Iosevka:size=9:bold}${lua get_grouped_processes cpu 4}${font}

${voffset 10}${goto 14}${font Iosevka:size=12:bold}${color2}TOP PROCESSES (MEM)${font}${color}
${font Iosevka:size=9:bold}${lua get_grouped_processes mem 4}${font}
]]
