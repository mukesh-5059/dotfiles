-- Configurations for AMD GPU
conky.config = {
	background = true,
	use_xft = true,
	font = 'monospace:size=8',
	xftalpha = 0.6,
	update_interval = 1.0,
	update_interval_on_battery = 3,
	total_run_times = 0,
	own_window = true,
	own_window_transparent = true,
	own_window_type = 'override',
	own_window_class = 'conky',
	own_window_argb_visual = true,
	own_window_colour = '#131313',
	own_window_argb_value = 255,

	own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
	double_buffer = true,
	draw_shades = false,
	draw_outline = false,
	draw_borders = false,
	draw_graph_borders = false,
	stippled_borders = 1,
	border_width = 1,
	default_bar_width = 100,
	default_bar_height = 6,
	default_gauge_height = 20,
	default_gauge_width = 40,
	default_graph_height = 25,
	default_graph_width = 100,
	default_color = 'white',
	default_shade_color = 'gray',
	default_outline_color = 'black',
	alignment = 'top_right',
	gap_x = 20,
	gap_y = 40,
	extra_newline = false,
	out_to_console = false,
	out_to_stderr = false,
	out_to_wayland = true,
	out_to_x = false,
	no_buffers = true,
	cpu_avg_samples = 2,
	diskio_avg_samples = 4,
	net_avg_samples = 2,
	if_up_strictness = 'address',
	temperature_unit = 'celsius',
	imlib_cache_size = 0,
	override_utf8_locale = true,
	border_inner_margin = 10,
	use_spacer = 'right',
	minimum_width = 350,
	maximum_width = 700,
	minimum_height = 800,
	uppercase = true,
	short_units = true,
	top_name_width = 15,
	top_name_verbose = false,
	max_text_width = 0,

	--Colors
	color1 = '#83fcf5',
	color2 = '#66a4fd',
	color3 = '#aa55ff',
	color4 = '#ff50f6',
	color5 = '#e647a7',
	color6 = '#e43188',
	color7 = '#ff9f7f',
	color8 = '#e0e17c',
	color9 = '#80ff41',
}

conky.text = [[
${color7}${font Xirod:size=9}Garudashboard ${color}${font}
${alignr}${offset -6}тФФтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФР
${alignr}${offset -6}${color}${exec grep 'NAME=' /etc/os-release | cut -d'=' -f2 | tr -d '"'} ${sysname} ${color}${machine}${color} тФАтФд
${alignr}${offset -6}< ${kernel} > Kernel тФАтФд   тФВ
${alignr}${offset -6}< ${uptime} > Uptime тФАтФд   тФВ
${alignr}${offset -6}< ${execi 1800 pacman -Q | wc -l} > packages тФАтФд   тФВ
${alignr}${offset -6}< ${execi 3000 checkupdates | wc -l} > updates тФАтФШ   тФВ
${alignr}${offset -6}тФВ
${alignr}${offset -6}< ${color3}${time %A %d %B %Y}  ${color7}${time %H:%M:%S}${color}${alignr}${offset -6} > ${color}flash info${color} тФАтФд
${alignr}${offset -6}тФВ
${alignr}${offset -6}${color}${font}system${font}${color} тФАтФд
${alignr}${offset -6}< ${execi 3600 cat /proc/cpuinfo|grep 'model name'|sed -e 's/model name.*: //'| uniq | cut -c 1-39} > ${color}${font}CPU${font}${color} тФАтФд   тФВ
${alignr}${offset -6}${font}CPU Frequency${font} тФАтФд   тФВ   тФВ
${alignr}${offset -6}< ${freq cpu0} MHz > тФА < $freq_g GHz > тФАтФШ      тФВ   тФВ   тФВ
${alignr}${offset -6}< ${color}${cpugraph cpu0 12,120 00ffff ff7f7f 0 -t} ${color}> тФАтФР   тФВ   тФВ   тФВ
${alignr}${offset -6}${color}used${color} тФАтФд   тФВ   тФВ
${alignr}${offset -6}< ${color1}${cpugraph cpu1 10,60 83fcf5 ff7f7f 0 -t} ${cpu cpu 1}% ${cpubar cpu1 5,85} ${color}> cpu1 тФАтФд   тФВ   тФВ   тФВ
${alignr}${offset -6}< ${color2}${cpugraph cpu2 10,60 66a4fd ff7f7f 0 -t} ${cpu cpu 2}% ${cpubar cpu2 5,85} ${color}> cpu2 тФАтФд   тФВ   тФВ   тФВ
${alignr}${offset -6}< ${color3}${cpugraph cpu3 10,60 aa55ff ff7f7f 0 -t} ${cpu cpu 3}% ${cpubar cpu3 5,85} ${color}> cpu3 тФАтФд   тФВ   тФВ   тФВ
${alignr}${offset -6}< ${color4}${cpugraph cpu4 10,60 ff50f6 ff7f7f 0 -t} ${cpu cpu 4}% ${cpubar cpu4 5,85} ${color}> cpu4 тФАтФд   тФВ   тФВ   тФВ
${alignr}${offset -6}тФВ   тФВ   тФВ
${alignr}${offset -6}< $loadavg > ${color}load${color} тФАтФд   тФВ   тФВ
${alignr}${offset -6}< ${color C5FFF8}${top name 1} ${top cpu 1}${color} > тФАтФд   тФВ   тФВ
${alignr}${offset -6}< ${color 96EFFF}${top name 2} ${top cpu 2}${color} > тФАтФд   тФВ   тФВ
${alignr}${offset -6}< ${color 5FBDFF}${top name 3} ${top cpu 3}${color} > тФАтФШ   тФВ   тФВ
${alignr}${offset -6}тФВ   тФВ
${alignr}${offset -6}${color}${font}Processes${font}${color} тФАтФд   тФВ
${alignr}${offset -6}< $processes > тФА < $running_processes > тФАтФШ   тФВ   тФВ
${alignr}${offset -6}тФВ   тФВ
${alignr}${offset -6}${color}${font}GPU (AMD)${font}${color} тФАтФд   тФВ
${alignr}${offset -6}< ${exec cat /sys/class/drm/card1/device/gpu_busy_percent}% > GPU load тФАтФд   тФВ   тФВ
${alignr}${offset -6}< ${exec expr $(cat /sys/class/drm/card1/device/mem_info_vram_used) / 1048576} MiB / ${exec expr $(cat /sys/class/drm/card1/device/mem_info_vram_total) / 1048576} MiB > vram тФАтФШ   тФВ   тФВ
${alignr}${offset -6}тФВ   тФВ
${alignr}${offset -6}${color}${font}Temperatures${font}${color} тФАтФд   тФВ
${alignr}${offset -6}< ${hwmon 1 temp 1} ┬░C > cpu тФАтФд   тФВ   тФВ
${alignr}${offset -6}< ${exec sensors amdgpu-pci-0500 | grep 'edge' | awk '{print $2}' | cut -c2-3} ┬░C > gpu тФАтФШ   тФВ   тФВ
${alignr}${offset -6}тФВ   тФВ
${alignr}${offset -6}${color}${font}Memory${font}${color} тФАтФд   тФВ
${alignr}${offset -6}RAM used тФАтФд   тФВ   тФВ
${alignr}${offset -6}< $mem/$memmax > тФАтФд        тФВ   тФВ   тФВ
${alignr}${offset -6}< ${color9}$memperc% ${membar 5,90}${color} > тФАтФШ        тФВ   тФВ   тФВ
${alignr}${offset -6}< ${color C5FFF8}${top name 1} ${top mem_res 1}${color} > тФАтФд   тФВ   тФВ
${alignr}${offset -6}< ${color 96EFFF}${top name 2} ${top mem_res 2}${color} > тФАтФШ   тФВ   тФВ
${alignr}${offset -6}тФВ   тФВ
${alignr}${offset -6}${color}${font}Disk Usage${font}${color} тФАтФШ   тФВ
${alignr}${offset -6}${diskiograph_read 10,120 55ffff ff557f -t -l} < $diskio_read >  read тФАтФд       тФВ
${alignr}${offset -6}${diskiograph_write 10,120 55ffff ffaa7f -t -l} < $diskio_write > write тФАтФд       тФВ
${alignr}${offset -6}< ${fs_used /}/ ${fs_size /} > /root тФАтФШ       тФВ
${alignr}${offset -6}тФВ
${alignr}${offset -6}${color}${font}Network (wlan0)${font}${color} тФАтФШ
${alignr}${offset -32}< $nodename > hostname тФАтФд
${alignr}${offset -32}< ${addr wlan0} > Lan тФАтФд
${alignr}${offset -32}< ${downspeed wlan0} k/s > download тФАтФд
${alignr}${offset -32}< ${downspeedgraph wlan0 10,120 55ffff aaff00 0 -t} > тФАтФШ     тФВ
${alignr}${offset -32}${voffset 0}< ${upspeed wlan0} k/s >   upload тФАтФШ
]]
