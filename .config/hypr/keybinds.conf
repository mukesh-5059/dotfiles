################
### PROGRAMS ###
################

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$menu = $HOME/scripts/rofi_scripts/RofiLauncher
$browser = zen-browser

################
### KEYBINDS ###
################

$mainMod = SUPER # Sets "Windows" key as main modifier

# Close Active Apps
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, K, exec, kill -9 $(hyprctl activewindow -j | jq '.pid')

# Window Keybinds
bind = $mainMod, V, exec, sh ~/scripts/rofi_scripts/Clipboard
bind = $mainMod, F, layoutmsg, colresize +conf
bind = $mainMod SHIFT, F, fullscreen, 0
bind = SUPER SHIFT, V, togglefloating,
#bind = $mainMod, J, togglesplit,
bindm = $mainMod, mouse:273, resizewindow

# Open App Launcher
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod SHIFT, SPACE, exec, $menu --choose-style

# Terminal Emulator
bind = $mainMod, RETURN, exec, $terminal tmux
bind = $mainMod SHIFT, RETURN, exec, [float; size 700 600] $terminal tmux 

# Open Yazi
bind = $mainMod, M, exec, $fileManager
bind = $mainMod SHIFT, M, exec, [float; size 525 260] sh ~/scripts/open_yazi.sh 

# Open Power Menu
bind = $mainMod, P, exec, sh ~/scripts/power_management.sh

#wayclick
bind = $mainMod, W, exec, sh ~/scripts/rofi_scripts/WayClickPack

# Open Browser
bind = $mainMod, B, exec, $browser

# EWW Stuff
#bind = $mainMod SHIFT, W, exec, sh ~/scripts/select_wallpaper.sh 
bind = $mainMod SHIFT, W, exec, sh ~/scripts/rofi_scripts/WallSelect
bind = $mainMod, E, exec, sh ~/scripts/launch_widgets.sh
bind = $mainMod, R, exec, sh ~/scripts/launch.sh
bind = $mainMod, C, exec, sh ~/scripts/toggle_conky.sh

# Reload Hyprpaper
bind = $mainMod, A, exec, sh ~/scripts/hyprpaper_reload.sh

# Screen Shot
bind = $mainMod, PRINT, exec, hyprshot -m output
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m region

#notifications
bind = $mainMod, H, exec, swaync-client -op

# Press Super + T to take an OCR screenshot
bind = $mainMod, T, exec, sh -c 'region=$(slurp) || exit; grim -g "$region" - | tesseract - - -l eng | wl-copy && notify-send "OCR Complete" "Text copied to clipboard"'

# Window focus
bind = $mainMod, Right, layoutmsg, move +col
bind = $mainMod, Left, layoutmsg, move -col

# Move Window
bind = $mainMod SHIFT, Right, layoutmsg, swapcol r
bind = $mainMod SHIFT, Left, layoutmsg, swapcol l

# Screen Rotation
bind = $mainMod ALT, Right, exec, sh ~/scripts/screen_rotate.sh -90
bind = $mainMod ALT, Left, exec, sh ~/scripts/screen_rotate.sh +90

# Resize Window
bind = $mainMod ALT, h, resizeactive, -40 0
bind = $mainMod ALT, i, resizeactive, 40 0
bind = $mainMod ALT, k, resizeactive, 0 -40
bind = $mainMod ALT, j, resizeactive, 0 40

# Move Floating Window
binde = $mainMod CTRL, h, moveactive, -40 0
binde = $mainMod CTRL, i, moveactive, 40 0
binde = $mainMod CTRL, k, moveactive, 0 -40
binde = $mainMod CTRL, j, moveactive, 0 40

# Volume and Media Control
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume 3
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume -3
binde = SHIFT, XF86AudioRaiseVolume, exec, swayosd-client --output-volume 3 --device alsa_output.pci-0000_05_00.6.analog-stereo
binde = SHIFT, XF86AudioLowerVolume, exec, swayosd-client --output-volume -3 --device alsa_output.pci-0000_05_00.6.analog-stereo
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bind = , XF86AudioNext, exec, swayosd-client --playerctl next
bindr = , Caps_Lock, exec, swayosd-client --caps-lock

# Brightness Control
binde = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, up, workspace, -1
bind = $mainMod, down, workspace, +1
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, up, movetoworkspace, -1
bind = $mainMod SHIFT, down, movetoworkspace, +1
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

gesture = 3, vertical, workspace
gesture = 4, vertical, scale: 1.0, fullscreen