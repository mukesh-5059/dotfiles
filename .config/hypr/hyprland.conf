####################
### OTHER CONFIG ###
####################

source = ~/.config/hypr/keybinds.conf

################
### MONITORS ###
################

monitor=,highres,auto,1
#monitor=HDMI-A-2,highrr,auto,1,mirror 

#################
### AUTOSTART ###
#################

exec-once = hyprpaper
exec-once = eww open-many bar
exec-once = swaync
exec-once = clipcatd
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hypridle
exec-once = hyprctl setcursor Qogir-white-cursors 24
exec-once = hyprpm reload -n 
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"

#############################
## ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = HYPRCURSOR_SIZE,24
#env = HYPRCURSOR_THEME,Qogir-white-cursors
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = HYPRSHOT_DIR, /home/mukes/screenshots 

#####################
### LOOK AND FEEL ###
#####################

general { 
    gaps_in = 5
    gaps_out = 8

    border_size = 0

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) #rgba(00ff99ee) 0deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false 

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = scrolling
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 14

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.95

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = false
        vibrancy = 0.8
        contrast = 0.6
        size = 8
        passes = 2
        ignore_opacity = false
    }

    shadow{
        enabled = false
        sharp = false
    }
    #blurls = gtk-layer-shell
    
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.8, 0.1, 1

    animation = windows, 1, 6, default
    animation = windowsOut, 1, 7, default, popin 95%
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default, slidevert
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = false # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


plugin {
    hyprscrolling {
        column_width = 0.7
        fullscreen_on_one_column = true
        explicit_column_widths = 0.7, 1.0
    }
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant = #colemak  
    kb_model =
    kb_options =
    kb_rules =
    

    follow_mouse = 1

    sensitivity = 0.8 # -acceleration = false1.0 - 1.0, 0 means no modification.
    accel_profile = flat

    touchpad {
        natural_scroll = true
    }
}


# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

#windowrulev2 = suppress_event fullscreen, class:.* # You'll probably like this.
 